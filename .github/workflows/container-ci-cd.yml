name: Container CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify code, build, and containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: booking-service
            path: ./services/booking-service
            port: 3001
          - service: driver-service
            path: ./services/driver-service
            port: 3002
          - service: tracking-service
            path: ./services/tracking-service
            port: 3003
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Build application
        working-directory: ${{ matrix.path }}
        run: npm run build --if-present

      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ./services/Dockerfile \
            --build-arg PORT=${{ matrix.port }} \
            ${{ matrix.path }}

  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dev Compose file
        run: docker compose config

      - name: Validate Prod Compose file
        run: |
          DOCKERHUB_USERNAME=dummy APP_NAME=dummy IMAGE_TAG=dummy docker compose -f docker-compose.prod.yml config

      - name: Build Compose stack
        run: docker compose build --pull

      - name: Start Compose stack
        run: docker compose up -d --wait

      - name: Show running services
        run: docker compose ps

      - name: Check gateway health
        run: |
          curl --fail http://localhost:8080/booking-service/health

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v  

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: booking-service
            path: ./services/booking-service
            port: 3001
          - service: driver-service
            path: ./services/driver-service
            port: 3002
          - service: tracking-service
            path: ./services/tracking-service
            port: 3003
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set repo name lowercase
        run: echo "REPO_NAME=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ./services/Dockerfile
          push: true
          build-args: |
            PORT=${{ matrix.port }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${SHORT_SHA}" >> "$GITHUB_STEP_SUMMARY"
