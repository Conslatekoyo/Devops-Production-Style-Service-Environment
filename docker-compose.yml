services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker-service-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      booking-service:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3001
      - BIND_HOST=0.0.0.0
      - SERVICE_B_URL=http://driver-service:3002
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      driver-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  driver-service:
    build:
      context: ./services/driver-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3002
      - BIND_HOST=0.0.0.0
      - SERVICE_C_URL=http://tracking-service:3003
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      tracking-service:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: ../Dockerfile
    environment:
      - PORT=3003
      - BIND_HOST=0.0.0.0
      - SERVICE_A_URL=http://booking-service:3001
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - frontend
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - frontend
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true

volumes:
  prometheus-data:
  grafana-data:
