services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker-service-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service-a
    restart: unless-stopped

  service-a:
    build:
      context: ./services/service-a
      dockerfile: ../Dockerfile
    environment:
      - PORT=3001
      - BIND_HOST=0.0.0.0
      - SERVICE_B_URL=http://service-b:3002
    depends_on:
      - service-b
      - service-c
    restart: unless-stopped

  service-b:
    build:
      context: ./services/service-b
      dockerfile: ../Dockerfile
    environment:
      - PORT=3002
      - BIND_HOST=0.0.0.0
      - SERVICE_C_URL=http://service-c:3003
    depends_on:
      - service-c
    restart: unless-stopped

  service-c:
    build:
      context: ./services/service-c
      dockerfile: ../Dockerfile
    environment:
      - PORT=3003
      - BIND_HOST=0.0.0.0
      - SERVICE_A_URL=http://service-a:3001
    restart: unless-stopped
