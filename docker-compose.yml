services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker-service-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped

  service-a:
    build:
      context: ./services/service-a
      dockerfile: ../Dockerfile
    environment:
      - PORT=3001
      - BIND_HOST=0.0.0.0
      - SERVICE_B_URL=http://service-b:3002
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  service-b:
    build:
      context: ./services/service-b
      dockerfile: ../Dockerfile
    environment:
      - PORT=3002
      - BIND_HOST=0.0.0.0
      - SERVICE_C_URL=http://service-c:3003
    depends_on:
      service-c:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  service-c:
    build:
      context: ./services/service-c
      dockerfile: ../Dockerfile
    environment:
      - PORT=3003
      - BIND_HOST=0.0.0.0
      - SERVICE_A_URL=http://service-a:3001
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  frontend:
  backend:
    internal: true
